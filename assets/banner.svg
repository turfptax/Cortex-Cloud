<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="340" viewBox="0 0 1280 340" role="img" aria-label="Cortex Cloud">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#0e1b2e"/>
      <stop offset="1" stop-color="#0a1f24"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7cdfd1"/>
      <stop offset="1" stop-color="#25b0a1"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7cdfd1" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7cdfd1" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1280" height="340" rx="18" fill="url(#bg)"/>
  <circle cx="1050" cy="150" r="230" fill="url(#glow)"/>

  <!-- neural / memory graph motif on the right -->
  <g stroke="#2f5a58" stroke-width="1.4" opacity="0.9">
    <line x1="980" y1="90"  x2="1080" y2="150"/>
    <line x1="1080" y1="150" x2="1010" y2="240"/>
    <line x1="1080" y1="150" x2="1180" y2="110"/>
    <line x1="1080" y1="150" x2="1170" y2="215"/>
    <line x1="980" y1="90"  x2="1010" y2="240"/>
    <line x1="1180" y1="110" x2="1170" y2="215"/>
    <line x1="900" y1="185" x2="1010" y2="240"/>
    <line x1="900" y1="185" x2="980"  y2="90"/>
  </g>
  <g fill="#0b1020" stroke="url(#teal)" stroke-width="2.5">
    <circle cx="1080" cy="150" r="16"/>
    <circle cx="980"  cy="90"  r="10"/>
    <circle cx="1010" cy="240" r="10"/>
    <circle cx="1180" cy="110" r="9"/>
    <circle cx="1170" cy="215" r="9"/>
    <circle cx="900"  cy="185" r="8"/>
  </g>
  <circle cx="1080" cy="150" r="16" fill="url(#teal)" opacity="0.25" filter="url(#soft)"/>

  <!-- wordmark -->
  <text x="90" y="150" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="76" font-weight="800" fill="#eef2f5" letter-spacing="-1.5">Cortex<tspan fill="url(#teal)"> Cloud</tspan></text>
  <text x="94" y="200" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="27" font-weight="500" fill="#9aa6b2">Your own AI memory, in the cloud you own.</text>

  <!-- feature chips -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="600">
    <g transform="translate(94,240)">
      <rect width="212" height="40" rx="20" fill="#12202f" stroke="#213243"/>
      <text x="20" y="26" fill="#7cdfd1">One-account private</text>
    </g>
    <g transform="translate(320,240)">
      <rect width="188" height="40" rx="20" fill="#12202f" stroke="#213243"/>
      <text x="20" y="26" fill="#7cdfd1">Scale-to-zero</text>
    </g>
    <g transform="translate(522,240)">
      <rect width="236" height="40" rx="20" fill="#12202f" stroke="#213243"/>
      <text x="20" y="26" fill="#7cdfd1">MCP for any AI</text>
    </g>
  </g>
</svg>
