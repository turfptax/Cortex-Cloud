[plugin]
name = "overseer"
version = "0.1.0"
description = "Memory upkeep agent - summarization, consolidation, working memory"
author = "turfptax"
entrypoint = "overseer"
enabled = true

[capabilities]
db = true                       # owns plugins/overseer/data/overseer.db (drop-and-rebuild safe)
display_screens = false         # background-only; no display surface
mcp_tools = true                # extends cortex_get_context with working_memory (slice 3d)
http_routes = true              # /plugins/overseer/* for Hub queries (later slice)
background_tasks = true         # consolidation loop (slice 3c)
core_memory_read = true         # reads notes/sessions/projects from cortex.db
core_memory_write = false       # LOCKED - overseer never writes to cortex.db
llm = true                      # uses LLMRouter (3 backends)

[llm]
# Per-plugin default backend; per-call override allowed.
# Fallback chain when the requested backend is unreachable:
#   openrouter (cloud, smart) → lmstudio (network, free smart) → ondevice (Pi, free slow).
# Per locked design (2026-05-02): three backends; never block; degrade gracefully.
backend = "openrouter"
model = "anthropic/claude-opus-4.7"
fallback = ["lmstudio", "ondevice"]

# Endpoints - LLMRouter reads these from the manifest.
openrouter_url   = "https://openrouter.ai/api/v1"
lmstudio_url     = "http://10.0.0.102:1234/v1"
lmstudio_model   = "auto"        # let LM Studio pick the loaded model
ondevice_url     = "http://127.0.0.1:8081/v1"
ondevice_model   = "auto"        # llama-server has one model loaded

# Per-call connect/read timeouts (seconds). Cloud is generous; ondevice is patient.
openrouter_timeout_s = 60
lmstudio_timeout_s   = 60
ondevice_timeout_s   = 120

# Secrets search paths (first-found wins). Per locked design the canonical
# install is the user's ~/.cortex/secrets.toml - but the cortex-core
# service on Pi runs as root, so Path.home() resolves to /root. We list
# multiple candidates to keep "user home" ergonomics while supporting the
# root-owned service. CORTEX_SECRETS env var (if set) overrides this list.
secrets_paths = [
  "/home/turfptax/.cortex/secrets.toml",
  "/root/.cortex/secrets.toml",
  "/etc/cortex/secrets.toml",
  "~/.cortex/secrets.toml",
]

# Per-task model overrides - when LLMRouter.complete() is called with
# a `purpose=` and no explicit `model=`, look up the model here. Falls
# back to [llm].model if the purpose isn't listed. Cheaper models for
# small structured tasks; Opus for the high-stakes interpretive work.
[llm.model_overrides]
# Slice 14.7.1 (2026-05-26): moved Opus → Gemini 2.0 Flash. Gist
# creation from a Claude Code .jsonl transcript is routine structured
# extraction (read messages, emit a paragraph + tags). Opus was
# ~$0.028/gist; Flash is ~$0.001/gist - 30x cheaper. With the
# imported_sessions backlog drain unblocked (752c022), keeping this
# on Opus would have cost ~$31 over ~10 days at the daily $3 budget
# cap; Flash brings the same drain to ~$1.20 and clears the queue
# in a single day. Quality is rechecked against the next 20 gists;
# if any regress meaningfully, fall back to "anthropic/claude-sonnet-4.6"
# (~$0.005/gist) before going back to Opus.
"summarize-session" = "google/gemini-2.5-flash"
"summarize-recent"  = "anthropic/claude-opus-4.7"
"working-memory"    = "anthropic/claude-opus-4.7"
# Slice 14.5 (2026-05-22): moved Sonnet → Gemini 2.0 Flash. Auto-
# tagging is a small structured task - model choice doesn't move
# tagging quality much, but it does move cost ~30x.
"auto-tag-notes"    = "google/gemini-2.5-flash"
# Slice 14.7.3 (2026-05-26): work/cortex/personal one-word classifier
# for web-AI sessions (chatgpt/grok-com without cwd). 8-token output,
# routine pattern match - Flash is exactly the right tier.
"category-classify" = "google/gemini-2.5-flash"
# Session NATURE classifier (session_classifier.py, proposed Stage 0.5,
# 2026-06-11). Only called on rule-margin ambiguity; tiny JSON output.
# Not wired into the loop yet; Pipeline Lab uses it for study.
"session-classify"  = "google/gemini-2.5-flash"
# Slice 14.7 (2026-05-22): router-tier chat. Flash sits in front of
# Opus-overseer, handles routine turns with thin context, escalates
# when the question needs the full agent. ~30x cheaper than Opus.
"router-chat"       = "google/gemini-2.5-flash"
"overseer-chat"     = "anthropic/claude-opus-4.7"
# Slice 3f: dialectic checker. Paired-generation runs Opus + this in
# parallel on every interpretive artifact; the diff is captured in
# dialectic_open. Cheap (~10x less than Opus) so doubling generation
# is still affordable.
"dialectic-check"   = "google/gemma-3-27b-it"
# Slice 3f.5: overseer journal. Sonnet by default - the journal is
# honest reflection, not literary work, and at 5min ticks the cost
# stays trivial. Override to Opus for deeper introspection if desired.
"overseer-journal"  = "anthropic/claude-sonnet-4.6"
# Slice 14.7.3 (2026-05-26): temporal weeklies on Sonnet. 4-5x
# cheaper than Opus, plenty of capability for synthesizing 7
# dailies + the category breakdown into a sectioned paragraph.
# Monthly + yearly stay on the default (Opus) - those are the
# durable artifacts Tory will re-read in years and deserve the
# bigger model.
"temporal-weekly"   = "anthropic/claude-sonnet-4.6"
# Slice 3f.5 #2: question-centered routing. Each new gist gets routed
# (or "unfiled") against active open_questions.
# Slice 14.5 (2026-05-22): moved Sonnet → Gemini 2.0 Flash. ~30x
# cheaper, plenty of capability for structured short tasks, large
# input window. Routine routing doesn't need Sonnet.
"evidence-routing"  = "google/gemini-2.5-flash"
# Slice 3h: insight scan. Reads recent gist arcs per project and
# proposes new theme/pattern/drift candidates to the pending queue.
# Slice 14.5: Sonnet → Gemini Flash for the same reason.
"insight-scan"      = "google/gemini-2.5-flash"
# Slice 3i CP2: distill corrections → blindspot proposals.
# Cheap clustering of small text rows - Flash territory.
"distill-corrections" = "google/gemini-2.5-flash"

[hooks]
subscribe = [
  "note.created",               # auto-tag / auto-summarize new notes
  "session.ended",              # consolidate session into a summary
  "tick.300s",                  # background upkeep cadence
]

[config]
# Tick interval for the consolidation loop (seconds).
# Configurable per locked design - different machines/workloads vary.
# Slice 5.5 (cadence calibration): bumped 300 → 900 (5min → 15min).
# At 5min the journal step alone burned ~17 calls/day = ~70% of the
# 25-call daily budget BEFORE the temporal step's 22:00-local trigger
# could fire. 15min gives ~96 ticks/day - enough cadence for fresh
# data without starving downstream Sonnet steps.
tick_interval_s = 900

# When Hub is unreachable for an LLM call, queue this many seconds
# before degrading to ondevice (with quality-reduced flag in output).
# Never block - overseer must never become a reason notes can't land.
hub_offline_degrade_after_s = 600

# Working-memory caps (used by the loop's _build_working_memory).
working_memory_top_projects = 5         # by relevance, not just recency
working_memory_top_projects_recency_days = 30
working_memory_recent_decisions = 10
working_memory_open_todos = 20
working_memory_open_questions = 10      # long-running, not actionable
working_memory_last_week_days = 7
working_memory_recent_themes = 5
working_memory_recent_episode_titles = 10
# Slice 3g - depth: surface signal that already lives in the DB so
# every working_memory read carries patterns/drift/notes/rollups, not
# just questions+gists. Zero LLM cost, pure aggregation.
working_memory_recent_patterns = 5
working_memory_recent_drift = 5
working_memory_recent_future_notes = 3   # newest institutional memory
working_memory_recent_rollups = 5         # daily automation rollups

# ── Background consolidation loop (slice 3c) ──────────────────────
# Per-tick, the overseer:
#   1. Auto-summarizes any sessions ended-but-not-yet-processed
#   2. Auto-tags any new untagged notes (using the cheaper model)
#   3. Rebuilds the working_memory artifact and caches it in overseer_state
# Cost guards prevent a runaway loop from burning credits.
loop_enabled = true
loop_first_tick_delay_s = 30            # don't hammer the LLM at startup
loop_max_llm_calls_per_tick = 50      # Slice 14.7.1 (2026-05-26):
                                       # bumped 20 → 30 → 50. 30 was
                                       # still tight: ticks were
                                       # processing exactly 15 imports
                                       # (30 calls / 2 per session) and
                                       # then hitting calls_remaining=0
                                       # right when the journal step's
                                       # budget.exhausted() check ran.
                                       # 50 gives ~20 imports + journal
                                       # Sonnet (~$0.019) + routing
                                       # overhead + headroom for the
                                       # working-memory neighbor scan.
                                       # Cost rail still binding via
                                       # the $0.50/tick cost cap, which
                                       # at Flash rates of ~$0.001/call
                                       # is well under 50 × $0.001.
                                       # Follow-up: the import step
                                       # should reserve ~3 calls for
                                       # downstream steps so it stops
                                       # before exhausting the tick
                                       # entirely. Filed in tasks.
loop_max_cost_usd_per_tick = 0.50     # cost cap unchanged - Gemma is
                                       # cheap so doubling calls barely
                                       # moves the cost dial
loop_auto_summarize_sessions = true
loop_auto_tag_notes = true
# Tier captured phone notifications (signal/ambient/drop) + parse weather
# into ambient_observations. Deterministic app-level rules, no LLM cost.
loop_classify_notifications = true
loop_build_working_memory = true
loop_session_summary_max_notes = 50     # truncate per-session prompt to N notes
loop_tag_batch_size = 10                # how many notes per tag-batch LLM call
loop_tag_max_per_note = 3

# Slice 3h: insight scan caps + auto-loop policy.
# Per-scan cap is a sanity ceiling; daily budget always applies on top.
insight_scan_max_cost_usd_per_scan = 0.05
insight_scan_default_days = 7

# Slice 3h CP2: auto-loop insight scanning.
# Manual /insight/scan-now ignores all of these and works on any project.
# The loop is conservative by design - opt-in to broader scans.
insight_loop_enabled = true
insight_loop_scan_interval_hours = 24      # per-project cadence
insight_loop_max_projects_per_tick = 2     # ceiling per tick
# Project policy options:
#   "active+human" - default; human-classified + still-unclassified ('auto')
#   "all" - also scan automation-classified projects
#   "never" - disable the auto-loop entirely (manual still works)
insight_loop_project_policy = "active+human"

# Slice 3h CP2: chat-snippet candidate extraction.
# When the overseer chat reply contains ```insight {...}``` blocks,
# parse them out (invisible to the user) and queue as pending
# interpretations. Free - no extra LLM call; the chat call already runs.
insight_chat_snippet_enabled = true

# Polish CP2: notification auto-archive policy.
# stale_active_project notifications older than this get auto-archived
# during evaluate_rules, even if the underlying staleness still holds.
# At some point the signal stops being actionable.
notification_stale_archive_days = 60

# Slice 3i CP2: correction-feedback loop.
# Periodic distill pass clusters uncondidated corrections into blindspot
# proposals. Conservative defaults: only fires if there are at least
# `loop_distill_min_corrections` undistilled corrections AND the last
# distill ran more than `loop_distill_interval_hours` ago.
distill_loop_enabled = true
distill_loop_min_corrections = 3
distill_loop_interval_hours = 24

# Slice 3d: imported third-party sessions (Claude Code .jsonl files).
# Loop processes unprocessed imports each tick (subject to budget).
# No high-water mark for imports - every import is an explicit user
# action so there's no day-zero backlog.
loop_summarize_imports = true
loop_import_transcript_chars = 30000    # head+tail truncate beyond this

# Slice 3f: paired-generation dialectic checker. When true, every
# interpretive artifact (gist, theme, episode, question identification)
# is generated by BOTH Opus and Gemma in parallel; the diff is
# captured in dialectic_open. Cost: ~10% per artifact (Gemma is much
# cheaper than Opus). Disable for cost-sensitive deployments.
#
# Slice 14.7 follow-up (2026-05-24): disabled. After 3 weeks the
# 160-row queue had 0 resolutions - the divergences are stylistic
# (Opus specific / Gemma generic), not interpretive. The meta-
# honesty surface wasn't earning its mental overhead at the gist
# altitude. The 160 backlog was bulk-resolved as 'no-action'.
loop_paired_generation = false

# Slice 3f.5: overseer journal - first-person reflection at end of
# each notable tick. Skips empty ticks; respects budget; uses Sonnet
# by default (~$0.005 per entry; ~$0.01-0.05/day depending on activity).
loop_journal_enabled = true
loop_journal_boot_read_n = 5      # how many recent entries to log on plugin load

# Slice 5.5 (cadence calibration): hard caps on journaling. Without
# these, the journal wrote on nearly every notable tick (215 entries
# in 3 days, eating 70-80% of the daily LLM budget before the
# temporal cadence step could fire its 22:00-local trigger). The cap
# is per LOCAL day (matches the user's calendar). The cooldown
# prevents a flurry of rapid ticks from each generating an entry.
loop_journal_max_per_local_day = 0  # 0 = unlimited (Slice 8); cooldown is the floor
loop_journal_min_minutes_between = 90

# Slice 3f.5 #2: question-centered routing. Every new gist is routed
# via Sonnet against active open_questions. Most are "unfiled" - that's
# correct, the routing is conservative by design.
loop_evidence_routing = true

# ── Slice 3e: classification + rollups ────────────────────────────
# Auto-classify projects with imports each tick. Heuristic: count >= 10
# AND avg duration < 2min → "automation". Otherwise "human". User can
# override via POST /plugins/overseer/projects/setting (sets
# manual_override=1; auto-classifier won't touch).
loop_auto_classify = true
loop_run_rollups = true
loop_rollups_max_per_tick = 5           # cheap (Sonnet) but still bound

# ── Slice 3e: daily budget (UTC midnight rollover) ────────────────
# Composes with loop_max_*_per_tick. Manual /backfill bypasses this.
# At default $1.00/day = ~20 Opus summaries OR ~250 Sonnet calls.
# Slice 9.2 raise (2026-05-12): bumped calls 100→250 + cost $2→$5 so the
# overseer can drain its ingest backlog (1,242 unprocessed sessions after
# the Slice 9.1 grok-com + grok-twitter + tweet imports). The earlier
# "Slice 8 night-work runway" 100/$2 was a self-imposed safety rail per
# Tory; not an Anthropic tier limit. With auto-tag-notes eating ~94 calls
# from the 1,546 imported tweets and the gist queue starving as a result,
# 250/day puts gist work back inside the daily budget. Dollar cap raised
# proportionally so calls stay the single binding control surface (today's
# call mix would have hit $2 at ~175 calls otherwise).
# Slice 14.5 (2026-05-22): pulled cost $5 → $3 in lockstep with
# moving auto-tag / evidence-routing / insight-scan / distill from
# Sonnet to Gemini 2.0 Flash (~30x cheaper). Tory's stated target:
# ~$1/day typical, hard ceiling $3. Slice 14.7.1 (2026-05-26): call
# cap raised 250 → 1500 after summarize-session moved Opus → Flash.
# At Flash rates a typical structured-extraction call is ~$0.001,
# so 1500 calls = ~$1.50 - still well under the $3 dollar cap,
# which is now the real safety rail. The 250 cap was a relic from
# when Opus was answering routine work; once routing pushed those
# off Opus the call counter became the artificially-binding one
# (single overnight Opus drain hit 250 in ~5h and starved Flash work
# behind it). Dollar cap stays the floor.
loop_daily_budget_usd = 3.00
loop_daily_budget_calls = 1500

# Slice 9.3 (2026-05-16): daily cap on overseer-initiated sibling task
# dispatches. Independent of the LLM call cap above - siblings burn the
# CALLER's LLM budget (Tory's Anthropic sub via Claude Code), not the
# overseer's. This cap is the safety rail against runaway dispatching
# (e.g. an overseer that "asks for a second opinion" on every chat turn
# and quietly queues 200 tasks/day for sibling sessions to grind through).
# Resets at local midnight (matches Slice 5.5 DailyBudget calendar).
loop_daily_sibling_dispatches = 20

# ── Slice 10 CP5 (2026-05-20): C-agent graduation thresholds ────────
# Bar for the daily _check_c_graduations tick step to PROPOSE a B-to-C
# promotion via Bell notification. Tory accepts/rejects; nothing
# auto-promotes.
#
# Locked design defaults (agent_ecosystem_design.md): 10 dispatches +
# 7 rated 4+ in a 7-day window. Initial production values below are
# LOWERED for shake-out testing (2026-05-20 directive): the path
# can't be exercised in a single day at 10/7/7, and we want to surface
# runtime bugs before the first real promotion. Revert to the design
# defaults (10 / 7 / 7) after we've seen one full happy-path graduation.
c_graduation_min_dispatches = 2
c_graduation_min_rated_4plus = 1
c_graduation_window_days = 1
c_graduation_check_enabled = true
c_agents_run_enabled = true

# ── Slice 9.4 CP2 (2026-05-16): periodic GitHub ingest ──────────────
# When enabled, the loop calls imports/github_ingester.py for each repo
# in loop_git_ingest_repos every loop_git_ingest_interval_hours. Adds a
# `source:git:<owner>/<name>` channel to the gist origin distribution,
# distinct from the chat sources. Per overseer's spec: the channel is
# adversarial to user-curation (catches what Tory ships, not what he
# surfaces). Skipped-repos are logged in overseer_state so the freshness
# block can show what is NOT being seen.
#
# Repo list is explicit, not auto-discovered. CP3 will add discovery +
# allow/deny list across the PAT-accessible repo set (~80 repos).
loop_git_ingest_enabled = true
loop_git_ingest_repos = [
    # Cortex family (turfptax, public) - Tory's current primary work.
    "turfptax/cortex-core",
    "turfptax/cortex-desktop",
    "turfptax/cortex-link",
    "turfptax/cortex-pet",
    # Open Muscle (public OSS hardware venture).
    "Open-Muscle/OpenMuscle-Software",
    "Open-Muscle/OpenMuscle-AR",
    "Open-Muscle/OpenMuscle-FlexGrid",
    "Open-Muscle/FlexGridV3-Firmware",
]
loop_git_ingest_interval_hours = 6
loop_git_ingest_lookback_days = 7

# ── YouTube persona-channel ingest (2026-06-11) ─────────────────────
# Polls each channel's public RSS feed (no API key, no quota) and
# writes one imported_sessions row per video, source youtube:<persona>.
# The persona layer: git channel = what Tory ships, chat channels =
# what he thinks, this = what his public personas say. Format is
# persona:channel_id[:project_tag]; project tag routes gist.created
# events to missions watching that project.
loop_youtube_ingest_enabled = true
loop_youtube_channels = [
    "turfptax:UCqUkg2M11LXsoSusLoh20YA:turfptax",
    "duelinggroks:UCwRZ7ZJgUOUoAF3QtIhae3Q:dueling-groks",
    "openmuscle:UC12raMSYtI46-IMjA5DaQ_g:open-muscle",
]
loop_youtube_ingest_interval_hours = 12

# ── Slice 3e: notifications rules ─────────────────────────────────
loop_run_notifications = true
notify_stale_project_days = 14          # warn after N days untouched
notify_stale_project_important_days = 30
notify_backlog_imports = 50             # info if backlog larger

[dependencies]
core_min = "0.1.0"
plugins = []
