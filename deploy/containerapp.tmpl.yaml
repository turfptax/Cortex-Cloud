# Cortex Cloud - Azure Container App definition (template).
#
# deploy.sh substitutes the ${...} placeholders from your .env and applies
# this with `az containerapp create --yaml`. It describes ONE app running
# four containers off a single image, sharing an ephemeral /data volume:
#
#   init  restore - Litestream restores the SQLite DBs from Blob on cold
#                      start (restore-before-writer is the data-safety rule)
#   core - the memory engine + loop, sole writer of the corpus
#   gateway - public ingress: /api + SPA + OAuth + MCP (port 8430)
#   embed - llama.cpp embedding server for semantic recall
#   litestream - streams the DBs back to Blob while warm
#
# Scale-to-zero (min 0): idle costs ~nothing; the first request wakes it.
location: ${LOCATION}
identity:
  type: SystemAssigned          # used to read Key Vault secrets + pull ACR
properties:
  environmentId: ${ENV_ID}
  configuration:
    activeRevisionsMode: Single
    ingress:
      external: true
      targetPort: 8430           # only the gateway is public; core is replica-local
      transport: auto
      allowInsecure: false
    registries:
      - server: ${ACR}.azurecr.io
        username: ${ACR}
        passwordSecretRef: acr-pwd
    secrets:
      - name: acr-pwd            # ACR admin password (reliable first pull)
        value: ${ACR_PWD}
      - name: service-token      # shared core<->gateway auth (generated by deploy.sh)
        value: ${SERVICE_TOKEN}
      - name: openrouter         # your LLM key, from Key Vault via managed identity
        keyVaultUrl: https://${KV}.vault.azure.net/secrets/openrouter
        identity: system
      - name: ls-key             # storage account key for Litestream
        value: ${STORAGE_KEY}
  template:
    initContainers:
      - name: restore
        image: ${IMAGE}
        command: ["/bin/sh", "/app/litestream-restore.sh"]
        env:
          - name: LITESTREAM_ACCOUNT
            value: ${STORAGE_ACCOUNT}
          - name: LITESTREAM_CONTAINER
            value: litestream
          - name: LITESTREAM_AZURE_ACCOUNT_KEY
            secretRef: ls-key
        resources: { cpu: 0.25, memory: 0.5Gi }
    containers:
      - name: core
        image: ${IMAGE}
        command: ["python", "/app/core/src/headless_main.py"]
        resources: { cpu: 0.5, memory: 1Gi }
        env:
          - name: CORTEX_DB_PATH
            value: /data/cortex.db
          - name: CORTEX_PLUGIN_DATA_DIR
            value: /data/plugins
          - name: OVERSEER_DB_PATH
            value: /data/plugins/overseer/overseer.db
          - name: GATEWAY_DB_PATH
            value: /data/gateway.db
          - name: CORTEX_SERVICE_TOKEN
            secretRef: service-token
          - name: CORTEX_HTTP_PORT
            value: "8420"
          - name: CORTEX_LOOP_MODE
            value: external        # the cron Job pokes /ops/tick; no in-process loop
          - name: CORTEX_TENANT_TZ
            value: ${TENANT_TZ}
          - name: CORTEX_LLM_BACKEND
            value: openrouter
          - name: CORTEX_LLM_FALLBACK
            value: none
          - name: CORTEX_WEATHER_ENABLED
            value: "0"
          - name: OPENROUTER_API_KEY
            secretRef: openrouter
          - name: CORTEX_EMBED_URL
            value: http://localhost:8082/v1/embeddings
      - name: gateway
        image: ${IMAGE}
        command: ["python", "-m", "uvicorn", "cortex_gateway.app:app", "--host", "0.0.0.0", "--port", "8430"]
        resources: { cpu: 0.25, memory: 0.5Gi }
        env:
          - name: PYTHONPATH
            value: /app/gateway   # REQUIRED so `import cortex_gateway` resolves
          - name: GATEWAY_DB_PATH
            value: /data/gateway.db
          - name: CORTEX_CORE_PATH
            value: /app/core
          - name: CORTEX_DB_PATH
            value: /data/cortex.db
          - name: OVERSEER_DB_PATH
            value: /data/plugins/overseer/overseer.db
          - name: CORTEX_CORE_URL
            value: http://localhost:8420
          - name: CORTEX_SERVICE_TOKEN
            secretRef: service-token
          - name: GATEWAY_HOST
            value: 0.0.0.0
          - name: GATEWAY_PORT
            value: "8430"
          - name: GATEWAY_PUBLIC_URL
            value: ${PUBLIC_URL}
          - name: GATEWAY_OAUTH_ENABLED
            value: "1"
          - name: GATEWAY_STATIC_DIR
            value: /app/gateway/hub_static   # serve the web Hub (cloud mode)
          - name: GATEWAY_OWNER_OIDS
            value: ${OWNER_OID}              # only this Entra account may sign in
          - name: GROQ_API_KEY
            value: ${GROQ_API_KEY}           # optional cloud voice (STT)
          - name: ELEVENLABS_API_KEY
            value: ${ELEVENLABS_API_KEY}     # optional cloud voice (TTS)
      - name: embed
        image: ghcr.io/ggml-org/llama.cpp:server-b5170   # PINNED (rolling tags break -mu)
        args: ["--embeddings", "--pooling", "mean", "--host", "127.0.0.1",
               "--port", "8082", "-mu",
               "https://huggingface.co/CompendiumLabs/bge-small-en-v1.5-gguf/resolve/main/bge-small-en-v1.5-q8_0.gguf"]
        resources: { cpu: 0.25, memory: 0.5Gi }
      - name: litestream
        image: ${IMAGE}
        command: ["/bin/sh", "/app/litestream-replicate.sh"]
        resources: { cpu: 0.25, memory: 0.5Gi }
        env:
          - name: LITESTREAM_ACCOUNT
            value: ${STORAGE_ACCOUNT}
          - name: LITESTREAM_CONTAINER
            value: litestream
          - name: LITESTREAM_AZURE_ACCOUNT_KEY
            secretRef: ls-key
    scale:
      minReplicas: 0
      maxReplicas: 1
    volumes:
      - name: data
        storageType: EmptyDir
